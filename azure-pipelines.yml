# CI/CD pipeline for Azure DevOps.
# Branching model: work on `development`, release from `main`.
#   - Push/PR to development or main: npm ci → lint → compile → tests → package .vsix → artifact.
#   - Push to main with a NEW version in package.json: the above PLUS publish to the Marketplace.
#     Guards keep ordinary main merges safe — publish runs ONLY when all of these hold:
#       (a) the branch is main,
#       (b) VSCE_PAT is configured (otherwise it just skips), and
#       (c) package.json's version is not already on the Marketplace (no republish / no red build).
#
# To release: bump `version` in package.json (+ CHANGELOG) on development, then merge to main.
#
# VSCE_PAT must be set as a SECRET pipeline variable (Pipelines → Edit → Variables → New →
# tick "Keep this value secret"). Use an Azure DevOps PAT with scope Marketplace → Manage.
# It is consumed only via env mapping below and is never stored in this file.

trigger:
  branches:
    include:
      - main
      - development

pr:
  branches:
    include:
      - main
      - development

pool:
  vmImage: ubuntu-latest

variables:
  # Default empty so the publish guard can detect "PAT not configured". A SECRET pipeline
  # variable named VSCE_PAT set in the UI overrides this at runtime.
  VSCE_PAT: ''

steps:
  - task: UseNode@1
    displayName: 'Install Node.js 20'
    inputs:
      version: '20.x'

  # Cache ~/.npm between runs (key = hash of package-lock.json).
  - task: Cache@2
    displayName: 'npm cache'
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(Pipeline.Workspace)/.npm

  - script: npm config set cache "$(Pipeline.Workspace)/.npm" --global
    displayName: 'Point npm to the cache'

  - script: npm ci
    displayName: 'Install dependencies (npm ci)'

  - script: npm run lint
    displayName: 'Lint (ESLint)'

  - script: npm run compile
    displayName: 'Compile (typecheck)'

  - script: npm test
    displayName: 'Tests (node:test)'

  - script: npx --yes @vscode/vsce package -o lang-chat.vsix
    displayName: 'Package (.vsix)'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish the .vsix'
    inputs:
      targetPath: lang-chat.vsix
      artifact: vsix

  # --- Marketplace release: ONLY from main, with a configured PAT, and a new version ---

  - script: |
      PKG_VERSION=$(node -p "require('./package.json').version")
      if [ -z "$VSCE_PAT" ]; then
        echo "VSCE_PAT is not configured — skipping Marketplace publish."
        echo "##vso[task.setvariable variable=shouldPublish]false"
        exit 0
      fi
      PUBLISHED=$(npx --yes @vscode/vsce show enavarre.lang-chat --json 2>/dev/null \
        | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);process.stdout.write((j.versions&&j.versions[0]&&j.versions[0].version)||'');}catch(e){process.stdout.write('');}});" || true)
      echo "package.json: $PKG_VERSION | marketplace: ${PUBLISHED:-<none>}"
      if [ "$PKG_VERSION" = "$PUBLISHED" ]; then
        echo "Version $PKG_VERSION is already published — skipping."
        echo "##vso[task.setvariable variable=shouldPublish]false"
      else
        echo "##vso[task.setvariable variable=shouldPublish]true"
      fi
    displayName: 'Decide whether to publish'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    env:
      VSCE_PAT: $(VSCE_PAT)

  - script: npx --yes @vscode/vsce publish --packagePath lang-chat.vsix
    displayName: 'Publish to VS Code Marketplace'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['shouldPublish'], 'true'))
    env:
      VSCE_PAT: $(VSCE_PAT)
